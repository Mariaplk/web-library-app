{% extends "base.html" %}

{% block title %}
{{ book.title }}
{% endblock %}

{% block content %}

<h1>{{ book.title }}</h1>

<div class="row">

    <div class="col-md-4">

        <img
            src="{{ cover_url }}"
            class="img-fluid"
            alt="Обложка"
        >

    </div>

    <div class="col-md-8">

        <p>
            <strong>Автор:</strong>
            {{ book.author }}
        </p>

        <p>
            <strong>Издательство:</strong>
            {{ book.publisher }}
        </p>

        <p>
            <strong>Год:</strong>
            {{ book.publish_year }}
        </p>

        <p>
            <strong>Страниц:</strong>
            {{ book.pages }}
        </p>

        <div>
            {{ description_html|safe }}
        </div>

    </div>

</div>

<hr>

<h3>Рецензии</h3>

{% endblock %}
