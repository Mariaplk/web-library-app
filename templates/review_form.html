{% extends "base.html" %}

{% block title %}
Рецензия
{% endblock %}

{% block content %}

<h2>Новая рецензия</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Оценка
        </label>

        <select
            name="rating"
            class="form-select"
        >
            <option value="5">Отлично</option>
            <option value="4">Хорошо</option>
            <option value="3">Удовлетворительно</option>
            <option value="2">Неудовлетворительно</option>
            <option value="1">Плохо</option>
            <option value="0">Ужасно</option>
        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Текст рецензии
        </label>

        <textarea
            name="review_text"
            rows="8"
            class="form-control"
        ></textarea>

    </div>

    <button
        type="submit"
        class="btn btn-primary"
    >
        Сохранить
    </button>

</form>

{% endblock %}
