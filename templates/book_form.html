{% extends "base.html" %}

{% block title %}
Книга
{% endblock %}

{% block content %}

<h2>{{ title }}</h2>

<form method="POST" enctype="multipart/form-data">

    <div class="mb-3">
        <label class="form-label">Название</label>
        <input
            type="text"
            name="title"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Автор</label>
        <input
            type="text"
            name="author"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Издательство</label>
        <input
            type="text"
            name="publisher"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Год</label>
        <input
            type="number"
            name="publish_year"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Количество страниц</label>
        <input
            type="number"
            name="pages"
            class="form-control"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Описание</label>

        <textarea
            name="description"
            rows="8"
            class="form-control"
        ></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Жанры</label>

        <select
            name="genres"
            class="form-select"
            multiple
        >
            {% for genre in genres %}
                <option value="{{ genre.id }}">
                    {{ genre.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Обложка
        </label>

        <input
            type="file"
            name="cover"
            class="form-control"
        >
    </div>

    <button
        type="submit"
        class="btn btn-success"
    >
        Сохранить
    </button>

</form>

{% endblock %}
